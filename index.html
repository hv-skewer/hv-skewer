<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hv-skewer | Developer</title>
    <!-- 使用更稳定的CDN链接 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            /* 视频加载失败时的备用背景 */
            background-color: #0a0a0a;
        }

        /* 第一层：视频背景（最底层） */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            /* 防止视频被拉伸变形 */
            object-position: center;
        }

        /* 第二层：半透明蒙版（中间层） */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.75) 0%,
                rgba(0, 0, 0, 0.5) 50%,
                rgba(0, 0, 0, 0.75) 100%
            );
            z-index: 0;
        }

        /* 第三层：文字内容（最顶层） */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .content h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 1.5s ease-out;
            /* 防止文字被选中 */
            user-select: none;
        }

        .content p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #e0e0e0;
            margin-bottom: 3rem;
            animation: fadeIn 1.5s ease-out 0.3s both;
            user-select: none;
        }

        .social-links {
            display: flex;
            gap: 2rem;
            animation: fadeIn 1.5s ease-out 0.6s both;
        }

        .social-links a {
            color: #ffffff;
            font-size: 2rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            color: #00d4ff;
            transform: translateY(-5px);
        }

        /* 简单的淡入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .social-links {
                gap: 1.5rem;
            }
            
            .social-links a {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- 第一层：视频背景（修复了所有兼容性问题） -->
    <video 
        class="video-background" 
        autoplay 
        muted 
        loop 
        playsinline
        disablepictureinpicture
        controlslist="nodownload"
        poster="https://picsum.photos/1920/1080"
        onerror="this.style.display='none'"
    >
        <source src="input.mp4" type="video/mp4">
        <!-- 备用视频源（可选） -->
        <source src="input.webm" type="video/webm">
    </video>

    <!-- 第二层：蒙版 -->
    <div class="overlay"></div>

    <!-- 第三层：文字内容（已替换为hv-skewer） -->
    <div class="content">
        <h1>Hi, I'm hv-skewer</h1>
        <p>Developer | Creator | Thinker</p>
        <div class="social-links">
            <a href="https://github.com/hv-skewer" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/hv-skewer" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>
            <a href="https://twitter.com/hv-skewer" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>
            <a href="mailto:hv-skewer@example.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script>
        // 确保视频在所有浏览器中都能自动播放
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.video-background');
            video.play().catch(function(error) {
                console.log('视频自动播放被阻止:', error);
            });
        });
    </script>
</body>
</html>
